<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mâm Ngũ Quả Coder - Cầu Vừa Đủ Pass Test</title>
    <link rel="icon" href="./logo.ico" />
    <meta
      name="description"
      content="Mini game Tết — mâm ngũ quả coder, cầu vừa đủ pass test. Trang vui trên GitHub Pages."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ngocquynhpham.github.io/joke.html" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ngocquynhpham.github.io/joke.html" />
    <meta property="og:title" content="Mâm Ngũ Quả Coder - Cầu Vừa Đủ Pass Test" />
    <meta
      property="og:description"
      content="Mini game Tết — mâm ngũ quả coder, cầu vừa đủ pass test. Trang vui trên GitHub Pages."
    />
    <meta property="og:image" content="https://ngocquynhpham.github.io/logo.ico" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mâm Ngũ Quả Coder - Cầu Vừa Đủ Pass Test" />
    <meta
      name="twitter:description"
      content="Mini game Tết — mâm ngũ quả coder, cầu vừa đủ pass test. Trang vui trên GitHub Pages."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #7f1d1d; /* Deep Red */
            overflow-x: hidden;
        }

        .tet-gradient {
            background: radial-gradient(circle, #b91c1c 0%, #7f1d1d 100%);
        }

        .tray {
            background: radial-gradient(circle, #d4af37 0%, #b8860b 100%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.3);
            border: 8px solid #aa8a2e;
        }

        .fruit-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fruit-card:hover {
            transform: scale(1.1) translateY(-10px);
        }

        .lucky-firework {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            animation: firework 1s ease-out forwards;
        }

        @keyframes firework {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(20); opacity: 0; }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pass-status {
            background-color: #166534; /* Success Green */
            border: 2px solid #22c55e;
            box-shadow: 0 0 15px #22c55e;
        }

        .real-fruit-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.2);
        }
        @media (min-width: 768px) {
            .real-fruit-img {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 tet-gradient text-white">

    <!-- Decorative Elements -->
    <div class="absolute top-0 left-0 p-4 hidden md:block">
        <div class="text-6xl opacity-20">🌸</div>
    </div>
    <div class="absolute top-0 right-0 p-4 hidden md:block">
        <div class="text-6xl opacity-20">🌸</div>
    </div>

    <!-- Header Section -->
    <div class="text-center mb-10 z-10">
        <h2 class="text-yellow-400 font-bold uppercase tracking-[0.3em] mb-2 text-sm">Xuân Ất Tỵ 2025</h2>
        <h1 class="text-4xl md:text-6xl font-black mb-4 drop-shadow-lg uppercase italic tracking-tighter">
            Mâm Ngũ Quả <span class="text-yellow-400">CODER</span>
        </h1>
        <div class="inline-block bg-yellow-500 text-red-900 px-6 py-1 rounded-full font-bold text-xs md:text-sm uppercase tracking-widest">
            Slogan: Cầu Vừa Đủ Pass Test
        </div>
    </div>

    <!-- The Tray (Mâm) -->
    <div class="relative w-full max-w-4xl aspect-square md:aspect-video flex items-center justify-center">
        <!-- Golden Tray -->
        <div class="tray w-[340px] h-[340px] md:w-[700px] md:h-[450px] rounded-[100px] md:rounded-full flex flex-wrap items-center justify-center p-8 relative">
            
            <!-- Fruit 1: Mãng Cầu (Updated with Real Image) -->
            <div class="fruit-card absolute top-2 md:top-4 left-[5%] md:left-[15%]" onclick="showBlessing('CẦU: Vạn sự khởi đầu nan, code đâu chạy đó!')">
                <img src="https://images.unsplash.com/photo-1595475253565-24328228fa31?q=80&w=500&auto=format&fit=crop" 
                     alt="Mãng cầu xiêm" 
                     class="real-fruit-img floating"
                     style="animation-delay: 0s;"
                     onerror="this.src='https://via.placeholder.com/150?text=Mang+Cau'">
                <div class="text-[10px] md:text-xs font-bold text-red-900 bg-yellow-400 px-2 py-0.5 rounded mt-2 text-center shadow-sm">MÃNG CẦU</div>
            </div>

            <!-- Fruit 2: Dừa -->
            <div class="fruit-card absolute top-2 md:top-4 right-[5%] md:right-[15%]" onclick="showBlessing('VỪA: Vừa đủ logic, vừa lòng khách hàng!')">
                <div class="text-6xl md:text-8xl floating" style="animation-delay: 0.5s;">🥥</div>
                <div class="text-[10px] md:text-xs font-bold text-red-900 bg-yellow-400 px-2 py-0.5 rounded mt-2 text-center shadow-sm">DỪA</div>
            </div>

            <!-- Fruit 3: Đu Đủ -->
            <div class="fruit-card absolute bottom-20 md:bottom-12 left-[10%] md:left-[20%]" onclick="showBlessing('ĐỦ: Đủ tài liệu, đủ ngân sách, đủ lương thưởng!')">
                <div class="text-6xl md:text-8xl floating" style="animation-delay: 1s;">🥭</div>
                <div class="text-[10px] md:text-xs font-bold text-red-900 bg-yellow-400 px-2 py-0.5 rounded mt-2 text-center shadow-sm">ĐU ĐỦ</div>
            </div>

            <!-- Item 4: Cái Bát (Pass) -->
            <div class="fruit-card absolute bottom-20 md:bottom-12 right-[10%] md:right-[20%]" onclick="showBlessing('BÁT (PASS): Mọi Unit Test, Integration Test đều xanh rờn!')">
                <div class="text-6xl md:text-8xl floating" style="animation-delay: 1.5s;">🥣</div>
                <div class="text-[10px] md:text-xs font-bold text-red-900 bg-yellow-400 px-2 py-0.5 rounded mt-2 text-center shadow-sm">CÁI BÁT (PASS)</div>
            </div>

            <!-- Item 5: Bánh Tét (Test) -->
            <div class="fruit-card absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20" onclick="showBlessing('TÉT (TEST): Test case nào cũng qua, bug nào cũng bị diệt!')">
                <div class="text-7xl md:text-9xl floating" style="animation-delay: 2s;">🥖</div>
                <div class="text-[10px] md:text-xs font-bold text-white bg-green-700 px-3 py-1 rounded-full mt-2 text-center shadow-lg border border-green-400 uppercase">Bánh Tét (Test)</div>
            </div>

        </div>
    </div>

    <!-- Status Message -->
    <div id="status-container" class="mt-8 md:mt-12 w-full max-w-lg">
        <div class="pass-status rounded-2xl p-6 text-center shadow-2xl">
            <div class="text-green-400 font-mono text-xs md:text-sm mb-2 font-bold uppercase tracking-[0.3em]">System Build Status</div>
            <div class="text-xl md:text-2xl font-black text-white min-h-[60px] flex items-center justify-center uppercase tracking-tight" id="blessing-text">NHẤN VÀO QUẢ ĐỂ NHẬN LỜI CHÚC</div>
            <div class="mt-4 flex justify-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse" style="animation-delay: 0.2s"></div>
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse" style="animation-delay: 0.4s"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="mt-12 text-center opacity-60">
        <p class="text-yellow-500 text-[10px] font-bold uppercase tracking-[0.2em]">© 2025 Dev Tet Celebration. No Bugs Allowed.</p>
    </div>

    <script>
        function showBlessing(text) {
            const display = document.getElementById('blessing-text');
            display.innerText = text;
            
            // Create some "digital fireworks"
            for(let i=0; i<15; i++) {
                const fw = document.createElement('div');
                fw.className = 'lucky-firework';
                fw.style.backgroundColor = ['#fbbf24', '#22c55e', '#ffffff', '#f87171'][Math.floor(Math.random()*4)];
                fw.style.left = Math.random() * 100 + 'vw';
                fw.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(fw);
                setTimeout(() => fw.remove(), 1000);
            }

            // Haptic-like effect for the status box
            const statusBox = document.querySelector('.pass-status');
            statusBox.style.transform = 'scale(1.05)';
            setTimeout(() => statusBox.style.transform = 'scale(1)', 100);
        }
    </script>
</body>
</html>

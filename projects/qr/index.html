<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Studio - Compact & Minimalist</title>
    <meta name="description" content="Tạo mã QR an toàn cho WiFi, Website và Liên hệ. Xử lý trực tiếp tại trình duyệt.">
    <meta name="keywords" content="tạo mã qr, qr code generator, qr wifi, qr minimalist">
    <meta name="author" content="QR Studio">
    <link rel="icon" href="./favicon.webp">        
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ngocquynhpham.github.io/projects/qr/index.html">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ngocquynhpham.github.io/projects/qr/index.html">
    <meta property="og:title" content="QR Studio - Minimalist QR Generator">
    <meta property="og:description" content="Tạo mã QR nhanh chóng và bảo mật tuyệt đối.">
    <meta name="twitter:card" content="summary_large_image">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; color: #334155; -webkit-tap-highlight-color: transparent; }
        .soft-shadow { box-shadow: 0 8px 30px -10px rgba(0,0,0,0.04); }
        .input-minimal { border-bottom: 1.2px solid #e2e8f0; transition: all 0.3s ease; border-radius: 0; }
        .input-minimal:focus { border-bottom-color: #3b82f6; background-color: #f8fafc; }
        .tab-btn { position: relative; transition: all 0.2s ease; }
        .tab-btn.active { color: #3b82f6; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; background-color: #3b82f6; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[380px]">
        <div class="text-center mb-5">
            <h1 class="text-xl font-medium tracking-tight text-slate-900">QR Studio</h1>
        </div>
        <main class="bg-white rounded-[2rem] p-7 soft-shadow border border-slate-50">
            <nav role="tablist" class="flex justify-between px-1 mb-6 gap-1">
                <button role="tab" aria-selected="true" aria-controls="panel-web" onclick="switchTab('website')" id="tab-web" class="tab-btn active text-[10px] font-medium uppercase tracking-wider">Link</button>
                <button role="tab" aria-selected="false" aria-controls="panel-wifi" onclick="switchTab('wifi')" id="tab-wifi" class="tab-btn text-slate-400 text-[10px] font-medium uppercase tracking-wider">WiFi</button>
                <button role="tab" aria-selected="false" aria-controls="panel-contact" onclick="switchTab('contact')" id="tab-contact" class="tab-btn text-slate-400 text-[10px] font-medium uppercase tracking-wider">Contact</button>
            </nav>
            <div class="flex flex-col items-center mb-6">
                <div class="p-4 bg-slate-50/50 rounded-[1.5rem] border border-slate-100/50 relative group">
                    <canvas id="qr-code" style="width: 200px; height: 200px;" aria-label="Mã QR"></canvas>
                    <div id="qr-description" class="sr-only">Mã QR cho nội dung của bạn</div>
                </div>
                <div id="display-label" class="mt-3 text-[10px] font-light text-slate-400 tracking-wide uppercase max-w-[220px] truncate text-center">Dán link để tạo mã</div>
            </div>
            <div class="space-y-4">
                <div id="panel-web" role="tabpanel" class="panel">
                    <label for="url-input" class="block text-[12px] font-semibold text-slate-400 uppercase tracking-widest mb-0.5 ml-0.5">URL</label>
                    <input type="text" id="url-input" placeholder="https://..." class="input-minimal w-full py-2 px-0.5 outline-none text-sm font-light bg-transparent" oninput="updateQR()">
                </div>
                <div id="panel-wifi" role="tabpanel" class="panel hidden space-y-3">
                    <div>
                        <label for="ssid" class="block text-[12px] font-semibold text-slate-400 uppercase tracking-widest mb-0.5 ml-0.5">WiFi SSID</label>
                        <input type="text" id="ssid" placeholder="Tên mạng..." class="input-minimal w-full py-2 px-0.5 outline-none text-sm font-light bg-transparent" oninput="updateQR()">
                    </div>
                    <div>
                        <label for="wifi-security" class="block text-[12px] font-semibold text-slate-400 uppercase tracking-widest mb-0.5 ml-0.5">Bảo mật</label>
                        <select id="wifi-security" onchange="updateWifiSecurityUI(); updateQR()" class="input-minimal w-full py-2 px-0.5 outline-none text-sm font-light bg-transparent appearance-none">
                            <option value="WPA">WPA / WPA2</option>
                            <option value="nopass">Mạng mở (không mật khẩu)</option>
                        </select>
                    </div>
                    <div id="wifi-password-row" class="relative">
                        <label for="password" class="block text-[12px] font-semibold text-slate-400 uppercase tracking-widest mb-0.5 ml-0.5">Mật khẩu</label>
                        <input type="password" id="password" placeholder="••••" class="input-minimal w-full py-2 px-0.5 outline-none text-sm font-light bg-transparent pr-7" oninput="updateQR()">
                        <button type="button" onclick="togglePassword()" class="absolute right-0 bottom-2 text-slate-300 hover:text-blue-500" aria-label="Hiện hoặc ẩn mật khẩu">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="panel-contact" role="tabpanel" class="panel hidden space-y-3">
                    <div>
                        <label for="contact-type" class="block text-[12px] font-semibold text-slate-400 uppercase tracking-widest mb-0.5 ml-0.5">Loại</label>
                        <select id="contact-type" onchange="updateQR()" class="input-minimal w-full py-2 px-0.5 outline-none text-sm font-light bg-transparent appearance-none">
                            <option value="tel">Hotline</option><option value="mailto">Email</option>
                        </select>
                    </div>
                    <div>
                        <label for="contact-value" class="block text-[12px] font-semibold text-slate-400 uppercase tracking-widest mb-0.5 ml-0.5">Thông tin</label>
                        <input type="text" id="contact-value" placeholder="..." class="input-minimal w-full py-2 px-0.5 outline-none text-sm font-light bg-transparent" oninput="updateQR()">
                    </div>
                </div>
                <div class="pt-3 flex gap-2">
                    <button type="button" onclick="copyToClipboard()" class="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-600 py-2.5 rounded-xl text-[11px] font-medium transition-colors">Copy</button>
                    <button type="button" onclick="downloadQR()" class="flex-1 bg-slate-900 hover:bg-black text-white py-2.5 rounded-xl text-[11px] font-medium transition-all shadow-md">Lưu QR</button>
                </div>
            </div>
        </main>
        <div class="mt-5 text-center space-y-1">
            <p class="text-[12px] text-slate-400 font-light tracking-wide uppercase">Privacy First</p>
            <p class="text-[12px] text-slate-300 font-light italic">Dữ liệu được xử lý 100% tại máy khách, không gửi lên server.</p>
        </div>
    </div>
    <div id="toast" role="status" aria-live="polite" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-black text-white px-4 py-2 rounded-full text-[10px] max-w-[min(90vw,320px)] text-center opacity-0 transition-opacity duration-300 pointer-events-none z-50">Đã sao chép</div>
    <script>
        const QR_SIZE = 256;
        let currentTab = 'website';
        function switchTab(tab) {
            currentTab = tab;
            ['tab-web', 'tab-wifi', 'tab-contact'].forEach(t => {
                const el = document.getElementById(t); el.classList.remove('active', 'text-slate-900'); el.classList.add('text-slate-400'); el.setAttribute('aria-selected', 'false');
            });
            const activeEl = document.getElementById(`tab-${tab === 'website' ? 'web' : tab}`);
            activeEl.classList.add('active', 'text-slate-900'); activeEl.classList.remove('text-slate-400'); activeEl.setAttribute('aria-selected', 'true');
            ['panel-web', 'panel-wifi', 'panel-contact'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(`panel-${tab === 'website' ? 'web' : tab}`).classList.remove('hidden');
            if (tab === 'wifi') updateWifiSecurityUI();
            updateQR();
        }
        function normalizeUrl(raw) {
            const t = (raw || '').trim();
            if (!t) return 'https://example.com';
            if (/^https?:\/\//i.test(t)) return t;
            return 'https://' + t;
        }
        function updateWifiSecurityUI() {
            const enc = document.getElementById('wifi-security').value;
            const row = document.getElementById('wifi-password-row');
            const pw = document.getElementById('password');
            if (enc === 'nopass') {
                row.classList.add('hidden');
                pw.value = '';
            } else {
                row.classList.remove('hidden');
            }
        }
        function togglePassword() {
            const input = document.getElementById('password'); const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text'; icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />';
            } else {
                input.type = 'password'; icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }
        function updateQR() {
            let value = "", label = "";
            if (currentTab === 'website') {
                const raw = document.getElementById('url-input').value;
                value = normalizeUrl(raw);
                label = raw.trim() ? value.replace(/^https?:\/\//i, '') : 'example.com';
            } else if (currentTab === 'wifi') {
                const ssid = (document.getElementById('ssid').value || '').trim() || 'WiFi';
                const enc = document.getElementById('wifi-security').value;
                const pass = enc === 'nopass' ? '' : document.getElementById('password').value;
                value = enc === 'nopass'
                    ? `WIFI:T:nopass;S:${ssid};P:;;`
                    : `WIFI:T:WPA;S:${ssid};P:${pass};;`;
                label = `WiFi: ${ssid}`;
            } else {
                const type = document.getElementById('contact-type').value; const val = document.getElementById('contact-value').value || "...";
                value = `${type}:${val}`; label = type === 'tel' ? `Hotline: ${val}` : `Email: ${val}`;
            }
            document.getElementById('display-label').innerText = label;
            document.getElementById('qr-description').innerText = `QR cho ${label}`;
            new QRious({ element: document.getElementById('qr-code'), value: value, size: QR_SIZE, level: 'M', foreground: '#0f172a', background: '#ffffff' });
        }
        function sanitize(str) { return str.replace(/[^a-z0-9]/gi, '_').toLowerCase(); }
        function downloadQR() {
            const canvas = document.getElementById('qr-code'); const label = document.getElementById('display-label').innerText;
            const s = canvas.width;
            const pad = 48;
            const textBlock = 88;
            const temp = document.createElement('canvas'); const ctx = temp.getContext('2d');
            temp.width = s + pad * 2; temp.height = s + pad * 2 + textBlock;
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, temp.width, temp.height);
            ctx.drawImage(canvas, pad, pad, s, s);
            ctx.font = "500 17px 'Plus Jakarta Sans', sans-serif"; ctx.fillStyle = "#64748b"; ctx.textAlign = "center";
            const cx = temp.width / 2;
            ctx.fillText(label, cx, s + pad + 36); ctx.font = "300 12px 'Plus Jakarta Sans', sans-serif";
            ctx.fillText("QR Studio", cx, s + pad + 64);
            const link = document.createElement('a'); link.download = `QR_${sanitize(label)}.png`; link.href = temp.toDataURL(); link.click();
        }
        function copyToClipboard() {
            const canvas = document.getElementById('qr-code');
            if (!canvas.toBlob) {
                showToast('Trình duyệt không hỗ trợ sao chép ảnh từ canvas.', true);
                return;
            }
            if (!navigator.clipboard || typeof ClipboardItem === 'undefined') {
                showToast('Sao chép ảnh cần HTTPS hoặc trình duyệt mới hơn. Dùng «Lưu QR».', true);
                return;
            }
            canvas.toBlob(blob => {
                if (!blob) {
                    showToast('Không tạo được ảnh. Thử lại hoặc dùng «Lưu QR».', true);
                    return;
                }
                try {
                    const data = [new ClipboardItem({ [blob.type]: blob })];
                    navigator.clipboard.write(data).then(() => showToast('Đã sao chép')).catch(() => showToast('Không thể sao chép — thử «Lưu QR».', true));
                } catch (e) {
                    showToast('Không thể sao chép — thử «Lưu QR».', true);
                }
            }, 'image/png');
        }
        let toastTimer;
        function showToast(message, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.toggle('bg-red-600', !!isError);
            toast.classList.toggle('bg-black', !isError);
            toast.style.opacity = '1';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, isError ? 3200 : 2000);
        }
        window.onload = () => { updateWifiSecurityUI(); updateQR(); };
    </script>
</body>
</html>

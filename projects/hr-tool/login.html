<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — HR Tool</title>
    <link rel="icon" href="./favicon.png" />
    <meta
      name="description"
      content="Đăng nhập HR Tool — phân tích JD & CV, hỗ trợ chiến dịch tuyển dụng (demo front-end trên GitHub Pages)."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ngocquynhpham.github.io/projects/hr-tool/login.html" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ngocquynhpham.github.io/projects/hr-tool/login.html" />
    <meta property="og:title" content="Đăng nhập — HR Tool" />
    <meta
      property="og:description"
      content="Đăng nhập HR Tool — phân tích JD & CV, hỗ trợ chiến dịch tuyển dụng (demo front-end trên GitHub Pages)."
    />
    <meta property="og:image" content="https://ngocquynhpham.github.io/logo.ico" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Đăng nhập — HR Tool" />
    <meta
      name="twitter:description"
      content="Đăng nhập HR Tool — phân tích JD & CV, hỗ trợ chiến dịch tuyển dụng (demo front-end trên GitHub Pages)."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #1e3a8a 0%, #1e40af 50%, #172554 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4 min-h-screen">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 backdrop-blur border border-white/20 mb-4">
                <i class="fas fa-graduation-cap text-3xl text-amber-300"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">HR TOOL</h1>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-8 border border-slate-100">
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                    <input type="email" id="email" required autocomplete="username"
                        class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="hr@example.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Mật khẩu</label>
                    <input type="password" id="password" required autocomplete="current-password"
                        class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="••••••••">
                </div>
                <p class="text-xs text-slate-500 bg-slate-50 rounded-lg px-3 py-2 border border-slate-100">
                    <i class="fas fa-info-circle text-blue-500 mr-1"></i>
                    Demo: nhập bất kỳ email/mật khẩu hợp lệ — không gửi dữ liệu ra ngoài.
                </p>
                <button type="submit"
                    class="w-full py-3 rounded-lg bg-blue-700 hover:bg-blue-800 text-white font-semibold transition flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </button>
            </form>
        </div>

    </div>

    <script>
        const KEY = 'hr_logged_in';

        if (sessionStorage.getItem(KEY) === '1') {
            window.location.replace('dashboard.html');
        }

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            sessionStorage.setItem(KEY, '1');
            sessionStorage.setItem('hr_user_email', document.getElementById('email').value.trim());
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>

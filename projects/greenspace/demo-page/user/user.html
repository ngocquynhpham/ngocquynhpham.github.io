        theme: {
          extend: {
            colors: {

              "primary-dark": "#0ea341",
              "background-light": "#f8fcf9",

            },
            fontFamily: {

  <body
    class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased min-h-screen flex flex-col"
  >
    <div id="site-header" data-base-path=".."></div>
    <main class="flex-grow w-full max-w-[1200px] mx-auto px-4 sm:px-6 py-8">
      <div class="flex flex-col lg:flex-row gap-8">
        <aside class="w-full lg:w-72 flex-shrink-0">
          <div
            class="bg-white rounded-xl border border-border-green shadow-sm p-4 sticky top-28"
          >
            <div
              class="flex items-center gap-4 p-4 mb-4 border-b border-border-green/50"
            >
              <div
                class="size-12 rounded-full bg-cover bg-center"
                data-alt="User profile avatar sidebar"
                style="
                  background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuD69yJuE_Yhd4JmieNsjPs-ZGjD59a6kW8f_GD4F-9hFV_Y0HIHrOxrrCcmCnVgn33tY6wQMtOU_UQ_Yj41zFMJLps_sK8WgalgICqbdf28uYNFA8AyRR9ALh6CrKcIA2wItxIC01TugC2MMrBuC4-Ob-K2ScH5ddAHw1ZiX9kjIwTpMOMp6VNVGUsQMfHulAGmztt19ZCzfcLyLaIWqM2DYRdcbiX4iMAMTLJvBKefBQ4FTvkeQ-gL5_LnboEMKrf-aMS9bpysvqo&quot;);
                "
              ></div>
              <div class="flex flex-col">
                <h3
                  class="font-bold text-text-main text-sm truncate max-w-[140px]"
                >
                  Nguyễn Văn A
                </h3>
                <div class="flex items-center gap-1 mt-0.5">
                  <span
                    class="material-symbols-outlined text-primary text-[14px] fill-1"
                    >verified</span
                  >
                  <span class="text-xs text-text-secondary"
                    >Thành viên Bạc</span
                  >
                </div>
              </div>
            </div>
            <nav class="flex flex-col gap-1">
              <a
                class="flex items-center gap-3 px-4 py-3 rounded-lg bg-border-green text-primary-dark font-medium transition-colors"
                href="./user.html"
              >
                <span class="material-symbols-outlined text-[20px] fill-1"
                  >person</span
                >
                <span class="text-sm">Thông tin tài khoản</span>
              </a>
              <a
                class="flex items-center gap-3 px-4 py-3 rounded-lg text-text-main hover:bg-border-green/50 hover:text-primary-dark transition-colors group"
                href="../cart/cart.html"
              >
                <span
                  class="material-symbols-outlined text-[20px] text-text-secondary group-hover:text-primary-dark"
                  >inventory_2</span
                >
                <span class="text-sm">Đơn hàng của tôi</span>
              </a>
              <a
                class="flex items-center gap-3 px-4 py-3 rounded-lg text-text-main hover:bg-border-green/50 hover:text-primary-dark transition-colors group"
                href="../payment/payment.html"
              >
                <span
                  class="material-symbols-outlined text-[20px] text-text-secondary group-hover:text-primary-dark"
                  >location_on</span
                >
                <span class="text-sm">Sổ địa chỉ</span>
              </a>
              <a
                class="flex items-center gap-3 px-4 py-3 rounded-lg text-text-main hover:bg-border-green/50 hover:text-primary-dark transition-colors group"
                href="../product/product-list.html"
              >
                <span
                  class="material-symbols-outlined text-[20px] text-text-secondary group-hover:text-primary-dark"
                  >favorite</span
                >
                <span class="text-sm">Sản phẩm yêu thích</span>
              </a>
              <div class="my-2 border-t border-border-green/50"></div>
              <a
                class="flex items-center gap-3 px-4 py-3 rounded-lg text-text-main hover:bg-red-50 hover:text-red-600 transition-colors group"
                href="../auth/login.html"
              >
                <span
                  class="material-symbols-outlined text-[20px] text-text-secondary group-hover:text-red-600"
                  >logout</span
                >
                <span class="text-sm">Đăng xuất</span>
              </a>
            </nav>
          </div>
        </aside>
        <div class="flex-1 min-w-0">
          <div
            class="bg-white rounded-xl border border-border-green shadow-sm overflow-hidden"
          >
            <div
              class="p-6 border-b border-border-green/50 bg-background-light/30"
            >
              <h1 class="text-2xl font-bold text-text-main">Hồ sơ của tôi</h1>
              <p class="text-text-secondary text-sm mt-1">
                Quản lý thông tin hồ sơ để bảo mật tài khoản
              </p>
            </div>
            <div class="p-6 lg:p-8">
              <div class="flex flex-col-reverse lg:flex-row gap-8 lg:gap-12">
                <div class="flex-1 flex flex-col gap-6">
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <label class="flex flex-col gap-2">
                      <span class="text-sm font-medium text-text-main"
                        >Họ và tên</span
                      >
                      <div class="relative">
                        <input
                          class="w-full rounded-lg border-border-green bg-background-light text-text-main px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-text-secondary/50"
                          type="text"
                          value="Nguyễn Văn A"
                        />
                      </div>
                    </label>
                    <label class="flex flex-col gap-2">
                      <span class="text-sm font-medium text-text-main"
                        >Số điện thoại</span
                      >
                      <div class="relative">
                        <input
                          class="w-full rounded-lg border-border-green bg-background-light text-text-main px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-text-secondary/50"
                          type="tel"
                          value="0912 345 678"
                        />
                      </div>
                    </label>
                  </div>
                  <label class="flex flex-col gap-2">
                    <span class="text-sm font-medium text-text-main"
                      >Email</span
                    >
                    <div class="relative group cursor-not-allowed">
                      <span
                        class="absolute inset-y-0 left-0 flex items-center pl-3 text-text-secondary"
                      >
                        <span class="material-symbols-outlined text-[20px]"
                          >mail</span
                        >
                      </span>
                      <input
                        class="w-full rounded-lg border-border-green bg-gray-50 text-text-secondary px-4 py-2.5 pl-10 text-sm focus:ring-0 focus:border-border-green cursor-not-allowed"
                        readonly=""
                        type="email"
                        value="nguyenvana@email.com"
                      />
                      <span
                        class="absolute inset-y-0 right-0 flex items-center pr-3 text-text-secondary"
                      >
                        <span class="material-symbols-outlined text-[18px]"
                          >lock</span
                        >
                      </span>
                    </div>
                    <span class="text-xs text-text-secondary"
                      >Email không thể thay đổi. Vui lòng liên hệ CSKH nếu cần
                      hỗ trợ.</span
                    >
                  </label>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                      <span class="text-sm font-medium text-text-main"
                        >Giới tính</span
                      >
                      <div class="flex items-center gap-6 py-2">
                        <label
                          class="flex items-center gap-2 cursor-pointer group"
                        >
                          <input
                            class="size-4 text-primary focus:ring-primary border-gray-300"
                            name="gender"
                            type="radio"
                          />
                          <span
                            class="text-sm text-text-main group-hover:text-primary transition-colors"
                            >Nam</span
                          >
                        </label>
                        <label
                          class="flex items-center gap-2 cursor-pointer group"
                        >
                          <input
                            class="size-4 text-primary focus:ring-primary border-gray-300"
                            name="gender"
                            type="radio"
                          />
                          <span
                            class="text-sm text-text-main group-hover:text-primary transition-colors"
                            >Nữ</span
                          >
                        </label>
                        <label
                          class="flex items-center gap-2 cursor-pointer group"
                        >
                          <input
                            class="size-4 text-primary focus:ring-primary border-gray-300"
                            name="gender"
                            type="radio"
                          />
                          <span
                            class="text-sm text-text-main group-hover:text-primary transition-colors"
                            >Khác</span
                          >
                        </label>
                      </div>
                    </div>
                    <label class="flex flex-col gap-2">
                      <span class="text-sm font-medium text-text-main"
                        >Ngày sinh</span
                      >
                      <div class="relative">
                        <input
                          class="w-full rounded-lg border-border-green bg-background-light text-text-main px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-text-secondary/50"
                          type="date"
                        />
                      </div>
                    </label>
                  </div>
                  <div class="pt-4 flex justify-end">
                    <button
                      class="bg-primary hover:bg-primary-dark text-white font-semibold py-2.5 px-8 rounded-lg shadow-sm shadow-primary/30 transition-all active:scale-95"
                    >
                      Lưu thay đổi
                    </button>
                  </div>
                </div>
                <div
                  class="flex flex-col items-center gap-4 lg:w-64 lg:border-l lg:border-border-green/50 lg:pl-12 pt-4 lg:pt-0"
                >
                  <div class="relative group cursor-pointer">
                    <div
                      class="size-32 rounded-full border-4 border-border-green bg-cover bg-center shadow-sm overflow-hidden"
                      data-alt="Large profile picture of the user"
                      style="
                        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCpzuifM4swQrAqE9aoiM10G0hAilh5cYNGPHVPYuuG6oILRochaIZ6enM36dYCIFWtMKRsmNgXcaDhVMMQDyfVaSOhB6U0NioPK_QqSYk4maOgQ4AuP-QmdYXAXKFZEaha-loGugJiBtAcyUS-ZRRYRtR1lXLzxw2dSIMP_bBO6eIvoTzdIIkaDpNpej5jriWf6Ygu_2BQhERYNf0i-olHtshEHng8mnoUQ1BQjn7oqmCPWMBkNZyJ-99S3VpkdvGP98QkEuz9pSk&quot;);
                      "
                    >
                      <div
                        class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"
                      >
                        <span
                          class="material-symbols-outlined text-white text-[32px]"
                          >photo_camera</span
                        >
                      </div>
                    </div>
                    <button
                      class="absolute bottom-1 right-1 bg-white border border-border-green text-text-secondary rounded-full p-1.5 shadow-sm hover:text-primary hover:border-primary transition-colors"
                    >
                      <span class="material-symbols-outlined text-[16px] block"
                        >edit</span
                      >
                    </button>
                  </div>
                  <div class="text-center">
                    <p class="text-xs text-text-secondary mb-3">
                      Dụng lượng file tối đa 1 MB<br />Định dạng: .JPEG, .PNG
                    </p>
                    <button
                      class="text-sm font-medium text-primary hover:text-primary-dark hover:underline"
                    >
                      Chọn ảnh
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="site-footer" data-base-path=".."></div>
    <script src="../../shared/layout.js"></script>

</html>

    <script>
      (function () {
        const loginTab = document.getElementById("login-tab");
        const registerTab = document.getElementById("register-tab");
        if (!loginTab || !registerTab) return;

        const activate = (tab) => {
          const isRegister = tab === "register";
          loginTab.className = isRegister
            ? "flex flex-col items-center justify-center border-b-[3px] border-b-transparent text-text-secondary dark:text-gray-400 hover:text-text-main dark:hover:text-gray-200 pb-3 pt-2 cursor-pointer transition-colors bg-transparent"
            : "flex flex-col items-center justify-center border-b-[3px] border-b-primary text-text-main dark:text-white pb-3 pt-2 cursor-pointer transition-colors bg-transparent";
          registerTab.className = isRegister
            ? "flex flex-col items-center justify-center border-b-[3px] border-b-primary text-text-main dark:text-white pb-3 pt-2 cursor-pointer transition-colors bg-transparent"
            : "flex flex-col items-center justify-center border-b-[3px] border-b-transparent text-text-secondary dark:text-gray-400 hover:text-text-main dark:hover:text-gray-200 pb-3 pt-2 cursor-pointer transition-colors bg-transparent";
        };

        loginTab.addEventListener("click", function () {
          activate("login");
        });
        registerTab.addEventListener("click", function () {
          activate("register");
        });
        activate(
          window.location.hash === "#register-tab" ? "register" : "login",
        );
      })();
    </script>

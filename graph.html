<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Writing Task 1 Pro Lab</title>
    <!-- CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-essay { font-family: 'Lora', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .view-hidden { display: none; }
        .card-chart-container { height: 120px; width: 100%; }
        /* Hiệu ứng mượt */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- Notification system instead of alert -->
    <div id="toast" class="fixed bottom-4 right-4 z-[100] transition-all transform translate-y-20 opacity-0">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
            <i id="toast-icon" class="fas fa-info-circle text-indigo-400"></i>
            <span id="toast-msg">Thông báo</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 px-4 h-16 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2 text-indigo-600 font-black text-xl tracking-tight cursor-pointer" onclick="showView('bank')">
            <div class="bg-indigo-600 text-white p-1 rounded-lg w-8 h-8 flex items-center justify-center"><i class="fas fa-chart-line text-sm"></i></div>
            IELTS LAB <span class="text-slate-400 font-light">PRO</span>
        </div>
        <div class="hidden md:flex gap-4">
            <button onclick="showView('bank')" class="nav-btn px-4 py-2 rounded-full text-sm font-bold transition bg-indigo-600 text-white" id="btn-bank">
                <i class="fas fa-database mr-2"></i> Ngân hàng đề
            </button>
            <button onclick="showView('create')" class="nav-btn px-4 py-2 rounded-full text-sm font-bold transition text-slate-500 hover:bg-slate-100" id="btn-create">
                <i class="fas fa-plus mr-2"></i> Tạo đề mới
            </button>
        </div>
        <button class="md:hidden p-2 text-slate-600" onclick="toggleMobileMenu()">
            <i class="fas fa-bars" id="menu-icon"></i>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 bg-white z-40 hidden pt-20 px-6 flex flex-col gap-4">
        <button onclick="showView('bank'); toggleMobileMenu()" class="w-full text-left py-4 text-xl font-bold border-b">Ngân hàng đề</button>
        <button onclick="showView('create'); toggleMobileMenu()" class="w-full text-left py-4 text-xl font-bold border-b">Tạo đề mới</button>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <!-- VIEW: BANK -->
        <section id="view-bank" class="space-y-8 fade-in">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Thư viện luyện tập</h2>
                    <p class="text-slate-500">Dữ liệu được lưu trữ trực tuyến để bạn luyện tập mọi lúc.</p>
                </div>
                <button onclick="showView('create')" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 hover:bg-indigo-700 transition active:scale-95">
                    <i class="fas fa-plus"></i> Tạo đề mới
                </button>
            </div>
            <div id="questions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Skeleton Loading -->
                <div class="animate-pulse bg-white rounded-3xl h-64 border border-slate-200"></div>
                <div class="animate-pulse bg-white rounded-3xl h-64 border border-slate-200 hidden sm:block"></div>
                <div class="animate-pulse bg-white rounded-3xl h-64 border border-slate-200 hidden lg:block"></div>
            </div>
        </section>

        <!-- VIEW: CREATE -->
        <section id="view-create" class="view-hidden max-w-5xl mx-auto fade-in">
            <button onclick="showView('bank')" class="flex items-center gap-2 text-slate-500 font-bold mb-6 hover:text-indigo-600 transition">
                <i class="fas fa-arrow-left"></i> Quay lại thư viện
            </button>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                        <h2 class="text-xl font-black mb-6 flex items-center gap-2 text-indigo-600">
                            <i class="fas fa-magic"></i> Thiết kế đồ thị
                        </h2>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Tiêu đề đề bài</label>
                                <textarea id="edit-title" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-indigo-100 outline-none transition min-h-[100px] text-sm" placeholder="The chart shows..."></textarea>
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Dạng biểu đồ</label>
                                <div class="grid grid-cols-4 gap-2">
                                    <button onclick="setChartType('bar')" class="type-btn py-3 rounded-xl text-[10px] font-black uppercase transition bg-indigo-600 text-white shadow-md" data-type="bar">Bar</button>
                                    <button onclick="setChartType('line')" class="type-btn py-3 rounded-xl text-[10px] font-black uppercase transition bg-slate-100 text-slate-500" data-type="line">Line</button>
                                    <button onclick="setChartType('pie')" class="type-btn py-3 rounded-xl text-[10px] font-black uppercase transition bg-slate-100 text-slate-500" data-type="pie">Pie</button>
                                    <button onclick="setChartType('mix')" class="type-btn py-3 rounded-xl text-[10px] font-black uppercase transition bg-slate-100 text-slate-500" data-type="mix">Mix</button>
                                </div>
                            </div>

                            <div class="flex justify-between items-center pt-4">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Dữ liệu bảng</label>
                                <div class="flex gap-2">
                                    <button onclick="toggleImport()" class="text-indigo-600 text-[10px] font-black uppercase tracking-widest flex items-center gap-1 hover:underline"><i class="fas fa-file-import"></i> Import</button>
                                    <button onclick="addRow()" class="bg-indigo-50 text-indigo-600 p-1 rounded-lg w-8 h-8 flex items-center justify-center hover:bg-indigo-100 transition"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>

                            <div id="import-area" class="hidden bg-indigo-50 p-5 rounded-2xl border border-indigo-100 animate-in slide-in-from-top-2">
                                <p class="text-[10px] text-indigo-400 font-bold mb-2 uppercase"><i class="fas fa-info-circle mr-1"></i> Định dạng: Tên, Số1, Số2</p>
                                <textarea id="import-text" class="w-full p-3 text-xs bg-white border border-indigo-100 rounded-xl h-32 font-mono focus:ring-2 focus:ring-indigo-100 outline-none" placeholder="2020, 50, 10&#10;2021, 80, 15"></textarea>
                                <button onclick="handleImport()" class="w-full mt-3 bg-indigo-600 text-white py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-indigo-100">Xử lý dữ liệu</button>
                            </div>

                            <div id="data-rows" class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                                <!-- Data rows go here -->
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Đơn vị 1</label>
                                    <input id="unit1" class="w-full px-3 py-2 text-xs border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-100" value="Units" oninput="updatePreview()">
                                </div>
                                <div id="unit2-container" class="hidden">
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Đơn vị 2</label>
                                    <input id="unit2" class="w-full px-3 py-2 text-xs border-2 border-green-50 text-green-600 rounded-xl outline-none focus:border-green-100" value="Rate (%)" oninput="updatePreview()">
                                </div>
                            </div>

                            <button onclick="saveQuestion()" id="save-btn" class="w-full mt-4 bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 hover:bg-indigo-600 transition active:scale-95">
                                <i class="fas fa-save text-lg"></i> Lưu đề bài
                            </button>
                        </div>
                    </div>
                </div>

                <div class="hidden lg:block">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-200 sticky top-24 shadow-sm">
                        <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest block mb-4 text-center">Live Preview</span>
                        <h3 id="preview-title-display" class="text-lg font-bold text-slate-800 mb-8 text-center leading-relaxed">Tiêu đề bài viết</h3>
                        <div class="chart-container">
                            <canvas id="previewChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- VIEW: PRACTICE -->
        <section id="view-practice" class="view-hidden fade-in">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <div class="flex items-center gap-4">
                    <button onclick="showView('bank')" class="p-3 bg-white hover:bg-slate-100 rounded-2xl transition border border-slate-200 shadow-sm"><i class="fas fa-arrow-left text-indigo-600"></i></button>
                    <div>
                        <h2 class="text-xl md:text-2xl font-black text-slate-800">Phòng luyện tập</h2>
                        <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Thời gian tối ưu: 20:00</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div id="word-count-badge" class="px-5 py-2.5 rounded-2xl font-black text-sm flex items-center gap-2 border shadow-sm transition-all bg-amber-50 text-amber-600 border-amber-200">
                        <i id="count-icon" class="fas fa-pen-fancy"></i>
                        <span id="word-count">0</span> Words
                    </div>
                    <button onclick="exportEssay()" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl font-bold text-sm flex items-center gap-2 hover:bg-indigo-600 transition shadow-lg active:scale-95">
                        <i class="fas fa-file-download"></i> Export .txt
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                <div class="space-y-6">
                    <div class="bg-white p-6 md:p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                        <div class="bg-slate-50 p-5 rounded-2xl border-l-4 border-indigo-500 mb-8">
                            <p id="practice-title" class="text-sm md:text-base font-bold text-slate-700 leading-relaxed italic"></p>
                        </div>
                        <div class="chart-container h-[400px]">
                            <canvas id="practiceChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col h-[500px] md:h-[650px] space-y-4">
                    <div class="bg-white rounded-[2.5rem] border border-slate-200 flex flex-col flex-1 shadow-sm overflow-hidden focus-within:ring-4 focus-within:ring-indigo-50 transition-all">
                        <div class="px-6 py-4 border-b bg-slate-50 flex items-center justify-between">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Essay Canvas</span>
                            <span id="target-msg" class="text-[10px] font-bold text-amber-500">Mục tiêu: 150+ từ</span>
                        </div>
                        <textarea id="essay-input" class="flex-1 p-6 md:p-8 text-lg leading-relaxed focus:outline-none resize-none font-essay text-slate-700 bg-transparent" placeholder="The provided graph illustrates the changes in..."></textarea>
                    </div>
                    <button onclick="finishPractice()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition active:scale-95">
                        <i class="fas fa-check-double mr-2"></i> Hoàn thành & Lưu bài
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Safety Guard ---
        let db, auth;
        const COLORS = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
        const DEFAULT_APP_ID = 'ielts-pro-lab-v2';
        const appId = typeof __app_id !== 'undefined' ? __app_id : DEFAULT_APP_ID;

        // --- State ---
        let currentView = 'bank';
        let questions = [];
        let creatorState = { type: 'bar', data: [{ name: 'Jan', value1: 45, value2: 12 }], unit1: 'Values', unit2: 'Rate' };
        let activeQuestion = null;
        let previewChart = null;
        let practiceChart = null;
        let thumbnailCharts = {};

        const initApp = async () => {
            try {
                if (typeof __firebase_config === 'undefined') throw new Error("Offline Mode");
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Auth
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // Listener
                const qCol = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                onSnapshot(qCol, (snapshot) => {
                    if (snapshot.empty) seedData(qCol);
                    else {
                        questions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        renderQuestionBank();
                    }
                });

            } catch (err) {
                console.warn("Firebase not available, using demo mode.");
                showToast("Đang chạy chế độ offline (Demo)", "fa-wifi-slash");
                // Mock data for local testing
                questions = [
                    { id: '1', title: 'Visitors to the National Museum (2010-2020)', type: 'line', unit1: 'Visitors', unit2: '', data: [{name: '2010', value1: 50}, {name: '2015', value1: 80}, {name: '2020', value1: 65}] },
                    { id: '2', title: 'Fruit consumption and health index', type: 'mix', unit1: 'Kg', unit2: 'Score', data: [{name: 'A', value1: 20, value2: 5}, {name: 'B', value1: 35, value2: 8}] }
                ];
                renderQuestionBank();
            }
        };

        const seedData = async (col) => {
            const items = [
                { title: "The chart shows the percentage of households with internet access between 2010 and 2020.", type: "line", unit1: "% Households", unit2: "", createdAt: Date.now(), data: [{name: '2010', value1: 25}, {name: '2015', value1: 60}, {name: '2020', value1: 95}] },
                { title: "Comparison of energy production and costs in 2023.", type: "mix", unit1: "GWh", unit2: "$/MWh", createdAt: Date.now(), data: [{name: 'Solar', value1: 450, value2: 40}, {name: 'Wind', value1: 600, value2: 55}, {name: 'Coal', value1: 1200, value2: 110}] }
            ];
            for (const item of items) await addDoc(col, item);
        };

        // --- Core UI Functions ---
        window.showView = (name) => {
            document.getElementById(`view-${currentView}`).classList.add('view-hidden');
            document.getElementById(`view-${name}`).classList.remove('view-hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.className = "nav-btn px-4 py-2 rounded-full text-sm font-bold transition text-slate-500 hover:bg-slate-100");
            const activeBtn = document.getElementById(`btn-${name}`);
            if(activeBtn) activeBtn.className = "nav-btn px-4 py-2 rounded-full text-sm font-bold transition bg-indigo-600 text-white shadow-md";

            currentView = name;
            if (name === 'create') {
                renderDataRows();
                updatePreview();
            }
            if (name === 'bank') renderQuestionBank();
        };

        const renderQuestionBank = () => {
            const grid = document.getElementById('questions-grid');
            if (questions.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 font-bold uppercase tracking-widest">Đang tải đề bài...</div>`;
                return;
            }

            grid.innerHTML = questions.map(q => `
                <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden hover:shadow-2xl hover:-translate-y-1 transition-all group flex flex-col h-full fade-in">
                    <div class="p-6 flex-1">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-widest px-2.5 py-1 rounded-lg border border-indigo-100">${q.type}</span>
                            <button onclick="deleteQuestion('${q.id}')" class="text-slate-300 hover:text-red-500 transition-colors p-2"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <h3 class="font-bold text-slate-800 line-clamp-2 mb-6 group-hover:text-indigo-600 transition-colors min-h-[3rem] text-sm leading-relaxed">${q.title}</h3>
                        <div class="bg-slate-50 rounded-2xl p-4 card-chart-container flex items-center justify-center overflow-hidden">
                            <canvas id="thumb-${q.id}"></canvas>
                        </div>
                    </div>
                    <div class="p-6 pt-0">
                        <button onclick="startPractice('${q.id}')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 group-hover:bg-indigo-600 transition-all active:scale-95 shadow-lg shadow-slate-100">
                            <i class="fas fa-pen-nib"></i> Luyện viết
                        </button>
                    </div>
                </div>
            `).join('');

            // Initialize thumbnails after DOM updated
            questions.forEach(q => {
                const ctx = document.getElementById(`thumb-${q.id}`).getContext('2d');
                if (thumbnailCharts[q.id]) thumbnailCharts[q.id].destroy();
                thumbnailCharts[q.id] = createChart(ctx, q.type, q.data, "", "", true);
            });
        };

        // --- Helper: Chart Creation ---
        const createChart = (ctx, type, data, u1, u2, isThumb = false) => {
            const labels = data.map(d => d.name);
            const datasets = [];

            if (type === 'pie') {
                datasets.push({
                    data: data.map(d => d.value1),
                    backgroundColor: COLORS,
                    borderWidth: 0
                });
            } else if (type === 'mix') {
                datasets.push({ type: 'bar', label: u1, data: data.map(d => d.value1), backgroundColor: '#6366f1', borderRadius: isThumb ? 2 : 6, yAxisID: 'y' });
                datasets.push({ type: 'line', label: u2, data: data.map(d => d.value2), borderColor: '#10b981', backgroundColor: '#10b981', borderWidth: isThumb ? 1 : 3, pointRadius: isThumb ? 0 : 4, tension: 0.4, yAxisID: 'y1' });
            } else {
                datasets.push({ type: type, label: u1, data: data.map(d => d.value1), backgroundColor: type === 'line' ? 'transparent' : '#6366f1', borderColor: '#6366f1', borderRadius: isThumb ? 2 : 6, borderWidth: isThumb ? 1 : 3, tension: 0.4, fill: type === 'line' ? false : true });
            }

            return new Chart(ctx, {
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: !isThumb, position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, font: { size: 10, weight: 'bold' } } },
                        tooltip: { enabled: !isThumb }
                    },
                    scales: (isThumb || type === 'pie') ? { x: { display: false }, y: { display: false } } : {
                        y: { position: 'left', grid: { color: '#f1f5f9' }, title: { display: !!u1, text: u1, font: { size: 10, weight: 'bold' } } },
                        y1: type === 'mix' ? { position: 'right', grid: { display: false }, title: { display: !!u2, text: u2, font: { size: 10, weight: 'bold' } } } : { display: false }
                    }
                }
            });
        };

        // --- Global Access for Events ---
        window.deleteQuestion = async (id) => {
            if (!confirm("Bạn có chắc chắn muốn xóa đề bài này?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
                showToast("Đã xóa đề bài", "fa-check");
            } catch (e) {
                questions = questions.filter(q => q.id !== id);
                renderQuestionBank();
                showToast("Đã xóa tạm thời (Offline)", "fa-info");
            }
        };

        window.setChartType = (type) => {
            creatorState.type = type;
            document.getElementById('unit2-container').classList.toggle('hidden', type !== 'mix');
            document.querySelectorAll('.type-btn').forEach(b => {
                const isActive = b.getAttribute('data-type') === type;
                b.className = isActive ? "type-btn py-3 rounded-xl text-[10px] font-black uppercase transition bg-indigo-600 text-white shadow-md" : "type-btn py-3 rounded-xl text-[10px] font-black uppercase transition bg-slate-100 text-slate-500";
            });
            renderDataRows();
            updatePreview();
        };

        window.addRow = () => {
            creatorState.data.push({ name: `Point ${creatorState.data.length + 1}`, value1: 0, value2: 0 });
            renderDataRows();
            updatePreview();
        };

        const renderDataRows = () => {
            const container = document.getElementById('data-rows');
            container.innerHTML = creatorState.data.map((d, i) => `
                <div class="flex gap-2 items-center bg-white border border-slate-100 p-2 rounded-2xl group transition-all hover:border-indigo-100">
                    <input class="w-20 px-2 py-1 text-[10px] outline-none font-bold text-slate-700" value="${d.name}" oninput="updateDataRow(${i}, 'name', this.value)">
                    <input type="number" class="flex-1 px-2 py-1 text-[10px] bg-slate-50 rounded-lg outline-none focus:ring-1 focus:ring-indigo-100" value="${d.value1}" oninput="updateDataRow(${i}, 'value1', this.value)">
                    <input type="number" class="flex-1 px-2 py-1 text-[10px] bg-green-50 text-green-700 rounded-lg outline-none focus:ring-1 focus:ring-green-100 ${creatorState.type !== 'mix' ? 'hidden' : ''}" value="${d.value2}" oninput="updateDataRow(${i}, 'value2', this.value)">
                    <button onclick="removeDataRow(${i})" class="text-slate-200 hover:text-red-400 p-1"><i class="fas fa-times-circle"></i></button>
                </div>
            `).join('');
        };

        window.updateDataRow = (idx, field, val) => {
            creatorState.data[idx][field] = field === 'name' ? val : parseFloat(val) || 0;
            updatePreview();
        };

        window.removeDataRow = (idx) => {
            if (creatorState.data.length <= 1) return;
            creatorState.data.splice(idx, 1);
            renderDataRows();
            updatePreview();
        };

        window.updatePreview = () => {
            const title = document.getElementById('edit-title').value || "Tiêu đề bài viết";
            document.getElementById('preview-title-display').innerText = title;
            const ctx = document.getElementById('previewChart').getContext('2d');
            if (previewChart) previewChart.destroy();
            previewChart = createChart(ctx, creatorState.type, creatorState.data, document.getElementById('unit1').value, document.getElementById('unit2').value);
        };

        window.saveQuestion = async () => {
            const title = document.getElementById('edit-title').value;
            if (!title) return showToast("Vui lòng nhập tiêu đề!", "fa-exclamation");
            
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Đang lưu...`;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                    title, type: creatorState.type, data: creatorState.data,
                    unit1: document.getElementById('unit1').value,
                    unit2: document.getElementById('unit2').value,
                    createdAt: Date.now()
                });
                showToast("Đã lưu thành công!", "fa-check");
                showView('bank');
            } catch (e) {
                showToast("Không thể lưu (Offline Mode)", "fa-info");
                showView('bank');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-save text-lg"></i> Lưu đề bài`;
            }
        };

        window.toggleImport = () => document.getElementById('import-area').classList.toggle('hidden');

        window.handleImport = () => {
            const text = document.getElementById('import-text').value;
            try {
                const newData = text.trim().split('\n').map(line => {
                    const parts = line.split(/[,;\t]/);
                    return { name: parts[0]?.trim() || '...', value1: parseFloat(parts[1]) || 0, value2: parseFloat(parts[2]) || 0 };
                });
                creatorState.data = newData;
                renderDataRows();
                updatePreview();
                toggleImport();
                showToast("Đã nhập dữ liệu", "fa-file-import");
            } catch (e) { showToast("Lỗi định dạng dữ liệu", "fa-times"); }
        };

        window.startPractice = (id) => {
            activeQuestion = questions.find(q => q.id === id);
            document.getElementById('practice-title').innerText = activeQuestion.title;
            document.getElementById('essay-input').value = "";
            updateWordCount("");
            showView('practice');
            
            setTimeout(() => {
                const ctx = document.getElementById('practiceChart').getContext('2d');
                if (practiceChart) practiceChart.destroy();
                practiceChart = createChart(ctx, activeQuestion.type, activeQuestion.data, activeQuestion.unit1, activeQuestion.unit2);
            }, 300);
        };

        const updateWordCount = (val) => {
            const count = val.trim() === "" ? 0 : val.trim().split(/\s+/).length;
            document.getElementById('word-count').innerText = count;
            const badge = document.getElementById('word-count-badge');
            const icon = document.getElementById('count-icon');
            const msg = document.getElementById('target-msg');

            if (count >= 150) {
                badge.className = "px-5 py-2.5 rounded-2xl font-black text-sm flex items-center gap-2 border shadow-sm transition-all bg-green-50 text-green-600 border-green-200";
                icon.className = "fas fa-check-circle";
                msg.innerText = "Đã đạt yêu cầu!";
                msg.className = "text-[10px] font-bold text-green-500";
            } else {
                badge.className = "px-5 py-2.5 rounded-2xl font-black text-sm flex items-center gap-2 border shadow-sm transition-all bg-amber-50 text-amber-600 border-amber-200";
                icon.className = "fas fa-pen-fancy";
                msg.innerText = `Cần thêm ${150 - count} từ`;
                msg.className = "text-[10px] font-bold text-amber-500 animate-pulse";
            }
        };

        document.getElementById('essay-input').addEventListener('input', (e) => updateWordCount(e.target.value));

        window.exportEssay = () => {
            const essay = document.getElementById('essay-input').value;
            if (!essay) return showToast("Chưa có nội dung để xuất!", "fa-exclamation");
            const count = document.getElementById('word-count').innerText;
            const content = `IELTS WRITING TASK 1 PRACTICE\n\nTOPIC: ${activeQuestion.title}\nWORD COUNT: ${count}\n\nESSAY:\n${essay}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ielts-writing-task1.txt`;
            a.click();
            showToast("Đã tải bài viết về máy", "fa-download");
        };

        window.finishPractice = () => {
            const count = parseInt(document.getElementById('word-count').innerText);
            if (count < 150 && !confirm("Bài viết chưa đủ 150 từ. Bạn vẫn muốn kết thúc?")) return;
            showToast("Chúc mừng bạn đã hoàn thành bài tập!", "fa-trophy");
            showView('bank');
        };

        window.toggleMobileMenu = () => {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('menu-icon');
            const hidden = menu.classList.toggle('hidden');
            icon.className = hidden ? "fas fa-bars" : "fas fa-times";
        };

        const showToast = (msg, icon) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').className = `fas ${icon} text-indigo-400`;
            toast.classList.replace('translate-y-20', 'translate-y-0');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.replace('translate-y-0', 'translate-y-20');
                toast.classList.replace('opacity-100', 'opacity-0');
            }, 3000);
        };

        // Initialize
        window.onload = initApp;

    </script>
</body>
</html>
